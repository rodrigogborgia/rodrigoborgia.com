# Nginx configuration for rodrigoborgia.com redirects and normalization
# Deploy to: /etc/nginx/conf.d/rodrigoborgia-redirects.conf on your VPS

server {
    listen 80;
    listen [::]:80;
    server_name www.rodrigoborgia.com rodrigoborgia.com;
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rodrigoborgia.com;
    
    # SSL config (asume lo tienes configurado, si no usa Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;
    
    # Redirige www a sin www
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name rodrigoborgia.com;
    
    # SSL config
    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;
    
    root /var/www/html;
    index index.html;
    
    # === BLOQUEOS EXACTOS (máxima prioridad) ===
    location = /wp-login.php { return 410; }
    location = /comments/feed/ { return 410; }
    location = /feed/ { return 410; }
    
    # === BACKEND API PROXY ===
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # === BLOQUEOS CON PREFIX (alta prioridad, sin try_files) ===
    location ^~ /wp-admin { return 410; }
    location ^~ /wp-content { return 410; }
    location ^~ /wp-includes { return 410; }
    location ^~ /wp-json { return 410; }
    location ^~ /author/ { return 301 /; }
    
    # === REDIRECCIONES 301 específicas ===
    location = /habilidades-blandas-2/ { return 301 /; }
    location = /plc1/ { return 301 /; }
    location = /negociacion-pregunta-clave/ { return 301 /; }
    location = /the-firefighters-escape-plan/ { return 301 /; }
    location = /FormID/ { return 301 /; }
    location = /errores- { return 301 /; }
    location = /category/uncategorized/ { return 301 /; }
    
    # === LANDING PDF: Negociar bajo presión ===
    location = /negociar-bajo-presion {
        try_files /negociar-bajo-presion.html =404;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /negociar-bajo-presion/ {
        return 301 /negociar-bajo-presion;
    }
    
    location = /negociar-bajo-presion.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # === ARTICULO DE APOYO SEO ===
    location = /negociacion-bajo-presion-guia {
        try_files /negociacion-bajo-presion-guia.html =404;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /negociacion-bajo-presion-guia/ {
        return 301 /negociacion-bajo-presion-guia;
    }

    location = /negociacion-bajo-presion-guia.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # === REACT SPA FALLBACK (al final) ===
    try_files $uri $uri/ =404;

    # Página 404 personalizada
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/html;
        internal;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Cache for assets (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # NO cachear index.html
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
