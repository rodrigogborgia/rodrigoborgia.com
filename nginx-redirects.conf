# Nginx configuration for rodrigoborgia.com redirects and normalization
# Deploy to: /etc/nginx/conf.d/rodrigoborgia-redirects.conf on your VPS

server {
    listen 80;
    listen [::]:80;
    server_name www.rodrigoborgia.com rodrigoborgia.com;
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rodrigoborgia.com;
    
    # SSL config (asume lo tienes configurado, si no usa Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;
    
    # Redirige www a sin www
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name rodrigoborgia.com;
    
    # SSL config
    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;
    
    root /var/www/html;
    index index.html;
    # Content Security Policy para Google Tag Manager y Analytics
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' www.googletagmanager.com www.google-analytics.com www.facebook.com connect.facebook.net www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com; img-src 'self' www.google-analytics.com www.facebook.com www.linkedin.com px.ads.linkedin.com; connect-src 'self' www.google-analytics.com www.googletagmanager.com www.facebook.com www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com;" always;

    # Página 404 personalizada
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/html;
        internal;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' www.googletagmanager.com www.google-analytics.com www.facebook.com connect.facebook.net www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com; img-src 'self' www.google-analytics.com www.facebook.com www.linkedin.com px.ads.linkedin.com; connect-src 'self' www.google-analytics.com www.googletagmanager.com www.facebook.com www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com;" always;
    }
    
    # Cache for assets (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # NO cachear index.html
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' www.googletagmanager.com www.google-analytics.com www.facebook.com connect.facebook.net www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com; img-src 'self' www.google-analytics.com www.facebook.com www.linkedin.com px.ads.linkedin.com; connect-src 'self' www.google-analytics.com www.googletagmanager.com www.facebook.com www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com;" always;
    }
}
