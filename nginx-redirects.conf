server {
    listen 80;
    listen [::]:80;
    server_name www.rodrigoborgia.com rodrigoborgia.com;
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rodrigoborgia.com;
    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;
    return 301 https://rodrigoborgia.com$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name rodrigoborgia.com;

    ssl_certificate /etc/letsencrypt/live/rodrigoborgia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rodrigoborgia.com/privkey.pem;

    root /var/www/html;
    index index.html;

    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' www.googletagmanager.com www.google-analytics.com www.facebook.com connect.facebook.net www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com; img-src 'self' www.google-analytics.com www.facebook.com www.linkedin.com px.ads.linkedin.com; connect-src 'self' www.google-analytics.com www.googletagmanager.com www.facebook.com www.linkedin.com snap.licdn.com px.ads.linkedin.com tagassistant.google.com www.googleadservices.com www.gstatic.com sibforms.com; frame-src 'self' https://tagassistant.google.com https://www.facebook.com;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    error_page 404 /404.html;
    location = /404.html {
        root /var/www/html;
        internal;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}