<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página no encontrada | Rodrigo Borgia</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="La página que buscas no existe. Volvé a la página principal para seguir aprendiendo sobre negociación y ventas." />
    <meta name="theme-color" content="#1A1A1A" />
    <link rel="icon" type="image/svg+xml" href="logos/rb-logo.svg" />
    <link rel="apple-touch-icon" href="logos/rb-logo.svg" />
    <link rel="stylesheet" href="index.css" />
    <style>
      body {
        background: #1A1A1A;
        color: #fff;
        font-family: 'Inter', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .notfound-container {
        background: #23272f;
        border-radius: 16px;
        box-shadow: 0 4px 24px 0 #0008;
        padding: 2.5rem 2rem 2rem 2rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        margin: 2rem auto;
      }
      .notfound-img {
        width: 180px;
        max-width: 100%;
        margin-bottom: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px #0006;
        background: #1A1A1A;
      }
      .notfound-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #D4AF37;
      }
      .notfound-text {
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
        color: #fff;
      }
      .notfound-btn {
        display: inline-block;
        background: linear-gradient(90deg,#61a5fa 0%,#d4af37 100%);
        color: #181c23;
        font-weight: 700;
        font-size: 1.1rem;
        border: none;
        border-radius: 8px;
        padding: 0.9rem 2.2rem;
        text-decoration: none;
        margin-top: 1rem;
        transition: background 0.2s;
        box-shadow: 0 2px 8px #0004;
        cursor: pointer;
      }
      .notfound-btn:hover {
        background: linear-gradient(90deg,#d4af37 0%,#61a5fa 100%);
        color: #181c23;
      }
    </style>
  </head>
  <body>
    <div class="notfound-container">
      <img src="logos/404.png" alt="Página no encontrada" class="notfound-img" />
      <div class="notfound-title">¡Ups! Página no encontrada</div>
      <div class="notfound-text">La página que buscás no existe o fue movida.<br>Podés volver a la página principal para seguir aprendiendo sobre negociación y ventas.</div>
      <a href="/" class="notfound-btn">Ir a la página principal</a>
    </div>
  </body>
</html>
