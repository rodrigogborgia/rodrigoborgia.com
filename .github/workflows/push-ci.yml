name: Main Release Flow

on:
  push:
    branches:
      - main

jobs:
  release-main:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar clean-css-cli y terser
        run: |
          npm install -g clean-css-cli terser

      - name: Minificar CSS y JS originales
        run: |
          cleancss -o frontend/index.min.css frontend/index.css
          cleancss -o frontend/animations.min.css frontend/animations.css
          terser frontend/scroll-fade.js -o frontend/scroll-fade.min.js


      - name: Deploy static frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/rodrigo/RB
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            sudo rm -rf /var/www/html/*
            sudo cp -r frontend/* /var/www/html/
            sudo cp frontend/404.html /var/www/html/404.html
            sudo chown -R www-data:www-data /var/www/html
            sudo cp nginx-redirects.conf /etc/nginx/conf.d/rodrigoborgia-redirects.conf
            sudo systemctl reload nginx

      - name: Release success
        run: echo "Main release flow completed for ${{ github.sha }}"
