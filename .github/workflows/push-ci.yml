name: Main Release Flow

on:
  push:
    branches:
      - main

jobs:
  release-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: VITE_API_URL=https://rodrigoborgia.com npm run build
        working-directory: frontend

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/rodrigo/RB
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r backend/requirements.txt
            sudo systemctl restart backend.service
            for i in {1..30}; do
              if curl --fail --silent --show-error http://127.0.0.1:8000/api/health; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend did not become healthy in time"
                sudo systemctl --no-pager --full status backend.service || true
                sudo journalctl -u backend.service -n 80 --no-pager || true
                exit 1
              fi
              sleep 1
            done
            cd frontend
            npm ci
            VITE_API_URL=https://rodrigoborgia.com npm run build
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo systemctl reload nginx

      - name: Release success
        run: echo "Main release flow completed for ${{ github.sha }}"
